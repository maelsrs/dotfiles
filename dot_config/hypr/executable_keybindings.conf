# ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# Main modifier
$mainMod = SUPER # windows key

# assign apps
$term = kitty
$editor = code --ozone-platform-hint=wayland --disable-gpu
$file = thunar
$browser = brave

# Window/Session actions
bind = $mainMod, Q, exec, $scrPath/dontkillsteam.sh # killactive
bind = ALT, F4, exec, $scrPath/dontkillsteam.sh # killactive
bind = $mainMod, delete, exit, # kill hyprland session
bind = $mainMod, W, togglefloating, # toggle floating
bind = $mainMod, G, togglegroup, # toggle group (tab mode)
bind = $mainMod, S, fullscreen, # toggle fullscreen
bind = $mainMod, L, exec, /home/mael/.local/share/quickshell-lockscreen/lock.sh # lock screen
bind = $mainMod SHIFT, F, exec, $scrPath/windowpin.sh # pin window
bind = $mainMod, backspace, exec, $scrPath/logoutlaunch.sh 1 # logout menu
bind = $CONTROL, ESCAPE, exec, killall waybar || waybar # toggle waybar

# Application shortcuts
bind = $mainMod, Return, exec, $term  # open terminal
bind = $mainMod, E, exec, $file # open file manager
bind = $mainMod, A, exec, $HOME/.config/hypr/UserScripts/WallpaperSelect.sh # select wallpaper
bind = $mainMod, C, exec, $editor # open vscode
bind = $mainMod, F, exec, $browser # open browser
bind = $CONTROL SHIFT, ESCAPE, exec, $scrPath/sysmonlaunch.sh # system monitor

# Rofi
bind = $mainMod, D, exec, pkill -x rofi || $scrPath/rofilaunch.sh d # app launcher
bind = $mainMod, tab, exec, pkill -x rofi || $scrPath/rofilaunch.sh w # window switcher
bind = $mainMod, R, exec, pkill -x rofi || $scrPath/rofilaunch.sh f # file browser

# Audio control
bindl  = , XF86AudioMute, exec, $scrPath/volumecontrol.sh -o m # toggle mute
bindl  = , XF86AudioMicMute, exec, $scrPath/volumecontrol.sh -i m # toggle mic mute
bindel = , XF86AudioLowerVolume, exec, $scrPath/volumecontrol.sh -o d # volume -
bindel = , XF86AudioRaiseVolume, exec, $scrPath/volumecontrol.sh -o i # volume +
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

# Brightness control
bindel = , XF86MonBrightnessUp, exec, $scrPath/brightnesscontrol.sh i
bindel = , XF86MonBrightnessDown, exec, $scrPath/brightnesscontrol.sh d

# Screenshot
bind = , Print, exec, grim ~/Pictures/$(date +%Y%m%d_%H%M%S).png # print all
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/$(date +%Y%m%d_%H%M%S).png | wl-copy

# Exec custom scripts
bind = $mainMod ALT, G, exec, $scrPath/gamemode.sh # gamemode
bind = $mainMod SHIFT, D, exec, $scrPath/wallbashtoggle.sh # toggle wallbash
bind = $mainMod, V, exec, pkill -x rofi || $scrPath/cliphist.sh c # clipboard
bind = $mainMod, K, exec, $scrPath/keyboardswitch.sh # switch keyboard

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, Tab, movefocus, d

$ws = ~/.config/hypr/scripts/workspace.sh
bind = $mainMod, code:10, exec, $ws 1
bind = $mainMod, code:11, exec, $ws 2
bind = $mainMod, code:12, exec, $ws 3
bind = $mainMod, code:13, exec, $ws 4
bind = $mainMod, code:14, exec, $ws 5
bind = $mainMod, code:15, exec, $ws 6
bind = $mainMod, code:16, exec, $ws 7
bind = $mainMod, code:17, exec, $ws 8
bind = $mainMod, code:18, exec, $ws 9
bind = $mainMod, code:19, exec, $ws 10

# Switch workspaces relative
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod CTRL, left, workspace, r-1
bind = $mainMod CTRL, down, workspace, empty

# Resize windows
binde = $mainMod SHIFT, right, resizeactive, 20 0
binde = $mainMod SHIFT, left, resizeactive, -20 0
binde = $mainMod SHIFT, up, resizeactive, 0 -20
binde = $mainMod SHIFT, down, resizeactive, 0 20

# Move active window to workspace with mainMod + SHIFT + [1-0]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# Move active window relative
bind = $mainMod CTRL ALT, right, movetoworkspace, r+1
bind = $mainMod CTRL ALT, left, movetoworkspace, r-1

# Move window in current workspace
bind = $mainMod SHIFT $CONTROL, left, movewindow, l
bind = $mainMod SHIFT $CONTROL, right, movewindow, r
bind = $mainMod SHIFT $CONTROL, up, movewindow, u
bind = $mainMod SHIFT $CONTROL, down, movewindow, d

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/Resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Toggle Layout
bind = $mainMod, J, togglesplit, # dwindle

